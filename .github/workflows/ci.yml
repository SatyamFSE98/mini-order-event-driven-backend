name: CI - Build and Test Backend Services

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build order-service
        working-directory: order-service
        run: mvn clean package -DskipTests

      - name: Build inventory-service
        working-directory: inventory-service
        run: mvn clean package -DskipTests

      - name: Build notification-service
        working-directory: notification-service
        run: mvn clean package -DskipTests

      - name: Build Docker images
        run: |
          docker build -t order-service:ci ./order-service
          docker build -t inventory-service:ci ./inventory-service
          docker build -t notification-service:ci ./notification-service